<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>lufs. — vectorscope + fog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@500;700;800&family=Public+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ground:#111111;--teal:#78BEBA;--blue:#2069af;--gold:#E7B225;--rust:#D35233;--cream:#fbf9e2;--muted:rgba(251,249,226,.62);--dim:rgba(251,249,226,.12);}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--ground);overflow:hidden;color:var(--cream);font-family:"Public Sans",system-ui,sans-serif;cursor:none}
  #gl{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0}
  .grain{position:fixed;inset:-50%;width:200%;height:200%;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");animation:grain 7s steps(6) infinite}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-6%,4%)}50%{transform:translate(5%,-5%)}75%{transform:translate(-4%,6%)}100%{transform:translate(0,0)}}
  .veil{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(125% 125% at 50% 44%,transparent 60%,rgba(8,8,8,.45) 100%)}
  .label{position:fixed;left:clamp(16px,3vw,34px);top:clamp(14px,3vh,28px);z-index:20;font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.28em;font-size:.62rem;color:var(--muted);pointer-events:none;line-height:1.9}
  .label b{color:var(--cream);font-weight:400}.label .dot{color:var(--teal)}
  .bar{position:fixed;right:clamp(16px,3vw,34px);top:clamp(14px,3vh,26px);z-index:40;display:flex;align-items:center;gap:10px;font-family:"Space Mono",monospace}
  .stat{font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7}
  .stat .live{color:var(--teal)}.stat .idle{color:var(--muted)}.stat b{color:var(--cream);font-weight:400}
  .btn{display:flex;align-items:center;gap:8px;border:1px solid var(--dim);border-radius:999px;background:rgba(12,12,12,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--cream);padding:9px 15px;font:inherit;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;cursor:none;transition:.2s ease}
  .btn:hover{border-color:var(--teal);color:var(--teal)}
  /* dial panel */
  .panel{position:fixed;right:clamp(12px,3vw,28px);top:64px;z-index:39;width:300px;max-height:82vh;overflow-y:auto;
    background:rgba(10,10,10,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--dim);border-radius:16px;padding:16px 16px 12px;
    font-family:"Space Mono",monospace;transform:translateY(-8px);opacity:0;pointer-events:none;transition:.22s ease;display:none}
  .panel.open{opacity:1;transform:none;pointer-events:auto;display:block}
  .panel h4{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--teal);margin:14px 0 8px;font-weight:700}
  .panel h4:first-child{margin-top:2px}
  .row{margin-bottom:11px}
  .row .lab{display:flex;justify-content:space-between;font-size:.55rem;letter-spacing:.04em;color:var(--muted);margin-bottom:5px;text-transform:none}
  .row .lab b{color:var(--cream);font-weight:400}
  .row input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:rgba(251,249,226,.16);border-radius:3px;outline:none;cursor:none}
  .row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--teal);cursor:none;border:2px solid #0c0c0c}
  .row input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--teal);cursor:none;border:2px solid #0c0c0c}
  .panel .acts{display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--dim);padding-top:12px}
  .panel .acts .btn{flex:1;justify-content:center;font-size:.55rem;padding:8px 10px}
  .panel textarea{width:100%;height:74px;margin-top:10px;background:#0c0c0c;border:1px solid var(--dim);border-radius:8px;color:var(--teal);font-family:"Space Mono",monospace;font-size:.52rem;padding:8px;resize:none;cursor:text}
  .cur-core,.cur-orbit,.cur-ring{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;border-radius:50%;mix-blend-mode:difference}
  .cur-core{width:6px;height:6px;background:var(--cream)}
  .cur-orbit{width:4px;height:4px;background:var(--teal)}
  .cur-ring{width:30px;height:30px;border:1px solid rgba(251,249,226,.7)}
  @media (hover:none){.cur-core,.cur-orbit,.cur-ring{display:none}html,body,.btn,input{cursor:auto}.row input[type=range]{cursor:pointer}}
  @media (max-width:680px){.stat{display:none}.panel{width:84vw}}
  @media (max-width:540px){.bar{gap:7px;right:10px;top:10px}.btn{padding:8px 11px;font-size:.55rem;letter-spacing:.12em}.label{left:12px;top:10px;font-size:.55rem;letter-spacing:.22em}.panel{top:56px;right:8px;width:92vw;max-height:72vh;padding:13px}}
</style>
</head>
<body>
  <canvas id="gl"></canvas><div class="veil"></div><div class="grain"></div>
  <div class="label"><div><b>lufs<span class="dot">.</span></b></div><div>vectorscope + fog</div></div>
  <div class="bar">
    <div class="stat"><div><b>elegant-picking</b></div><div id="amode">idle wisp</div></div>
    <button class="btn" id="dialBtn">⚙ Dials</button>
    <button class="btn" id="play"><span id="ico">▶</span><span id="plab">Enable audio</span></button>
  </div>
  <div class="panel" id="panel"></div>
  <div class="cur-core"></div><div class="cur-ring"></div><div class="cur-orbit"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  (function(){
    if(!window.THREE){document.body.style.background="#111";return;}
    const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas=document.getElementById('gl');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
    renderer.setClearColor(0x111111,1);const PR=Math.min(window.devicePixelRatio||1,2);renderer.setPixelRatio(PR);
    function sz(){renderer.setSize(innerWidth,innerHeight,false);}sz();

    /* ---------- params (defaults = current, ranges to extremes) ---------- */
    const PARAMS={
      scopeGain:{v:1.7,min:0.05,max:8,step:0.01,g:'Vectorscope (foreground)',label:'Gain — trace amplitude'},
      scopeBright:{v:0.9,min:0,max:3,step:0.01,g:'Vectorscope (foreground)',label:'Trace brightness'},
      scopeTrail:{v:16,min:1,max:48,step:1,g:'Vectorscope (foreground)',label:'Phosphor trail — frames'},
      scopeDecay:{v:0.52,min:0.30,max:0.995,step:0.005,g:'Vectorscope (foreground)',label:'Phosphor decay (higher = longer)'},
      scopeEnergy:{v:0.7,min:0,max:4,step:0.01,g:'Vectorscope (foreground)',label:'Energy → brightness'},
      scopePoints:{v:2048,min:64,max:2048,step:64,g:'Vectorscope (foreground)',label:'Trace resolution (points)'},
      scopeIdle:{v:0.61,min:0,max:1,step:0.01,g:'Vectorscope (foreground)',label:'Idle vertical wisp'},
      fogOpacity:{v:0.9,min:0,max:1,step:0.01,g:'Fog (brand-cycling aurora)',label:'Fog opacity — veil over scope'},
      fogBright:{v:0.65,min:0,max:2.5,step:0.01,g:'Fog (brand-cycling aurora)',label:'Fog brightness'},
      fogDrift:{v:0.06,min:0,max:0.6,step:0.005,g:'Fog (brand-cycling aurora)',label:'Drift speed'},
      fogWarp:{v:1.2,min:0,max:4,step:0.01,g:'Fog (brand-cycling aurora)',label:'Warp / turbulence'},
      fogBloom:{v:0.32,min:0,max:2,step:0.01,g:'Fog (brand-cycling aurora)',label:'Bass bloom'},
      fogDensity:{v:1,min:0,max:2,step:0.01,g:'Fog (brand-cycling aurora)',label:'Density'},
      colorCycle:{v:0.010,min:0,max:0.2,step:0.001,g:'Colour rotation (slew)',label:'Auto cycle speed'},
      colorAudio:{v:3,min:0,max:4,step:0.01,g:'Colour rotation (slew)',label:'Bass → colour push'},
      colorSlew:{v:0.2,min:0.02,max:8,step:0.01,g:'Colour rotation (slew)',label:'Slew rate (lower = more relaxed)'},
      reactSmooth:{v:0.30,min:0.02,max:1,step:0.01,g:'Reactivity',label:'Level smoothing'},
      idleDrift:{v:0.3,min:0,max:2,step:0.01,g:'Reactivity',label:'Pre-audio wisp intensity'},
      engageTime:{v:2.2,min:0,max:8,step:0.1,g:'Reactivity',label:'Audio engage ramp (s) — idle→reactive'},
      releaseTime:{v:4,min:0,max:12,step:0.1,g:'Reactivity',label:'Audio release ramp (s) — reactive→idle'},
      cursorCoreSize:{v:6,min:0,max:24,step:0.5,g:'Cursor',label:'Center dot size (px)'},
      cursorOrbitSize:{v:4,min:0,max:24,step:0.5,g:'Cursor',label:'Orbit dot size (base px)'},
      cursorOrbitSpeed:{v:0.018,min:0,max:0.2,step:0.001,g:'Cursor',label:'Orbit speed (base)'},
      cursorOrbitAudio:{v:0.05,min:0,max:0.5,step:0.005,g:'Cursor',label:'Bass → orbit speed'},
      cursorOrbitAudioSize:{v:3,min:0,max:20,step:0.5,g:'Cursor',label:'Bass → orbit dot size'},
      cursorIdleScale:{v:0.5,min:0.1,max:1,step:0.01,g:'Cursor',label:'Idle scale (slower/smaller when idle)'},
      cursorRadius:{v:9,min:0,max:40,step:0.5,g:'Cursor',label:'Orbit radius padding (px)'},
    };
    const PV=k=>PARAMS[k].v;

    /* ---------- pointer + cursor ---------- */
    const P={tnx:0,tny:0,nx:0,ny:0};
    addEventListener('pointermove',e=>{P.tnx=(e.clientX/innerWidth)*2-1;P.tny=-((e.clientY/innerHeight)*2-1);},{passive:true});
    // cursor — center dot (at the pointer) + lerp-following ring + a dot orbiting the ring.
    // orbit speed/size scale with the engage envelope (slow+small when idle → fuller once engaged) plus live bass. All dial-controlled.
    (function(){
      const core=document.querySelector('.cur-core'), ring=document.querySelector('.cur-ring'), orbit=document.querySelector('.cur-orbit');
      if(('ontouchstart' in window)||navigator.maxTouchPoints>0){core.style.display=ring.style.display=orbit.style.display='none';return;}
      ring.style.transition='none';
      let tx=innerWidth/2,ty=innerHeight/2,rx=tx,ry=ty,ang=0,hover=false,active=false,cur=30;
      const SEL='.btn,input,textarea,a,[data-hover]';
      addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;},{passive:true});
      addEventListener('mousedown',()=>active=true); addEventListener('mouseup',()=>active=false);
      addEventListener('mouseover',e=>{if(e.target.closest(SEL))hover=true;});
      addEventListener('mouseout',e=>{if(e.target.closest(SEL))hover=false;});
      (function l(){
        rx+=(tx-rx)*0.2; ry+=(ty-ry)*0.2;
        const tgt=active?14:(hover?18:30); cur+=(tgt-cur)*0.2;
        ring.style.width=ring.style.height=cur+'px';
        ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;
        let bass=0,eng=0; try{ bass=AUDIO.L.bass||0; eng=AUDIO.L.engage||0; }catch(e){}  // AUDIO in TDZ on first frame
        const lvl=PV('cursorIdleScale')+(1-PV('cursorIdleScale'))*eng;   // idle → engaged scale
        ang+=PV('cursorOrbitSpeed')*lvl + bass*PV('cursorOrbitAudio');
        const radius=cur/2+PV('cursorRadius');
        const ods=Math.max(0,PV('cursorOrbitSize')*lvl + bass*PV('cursorOrbitAudioSize'));
        orbit.style.width=orbit.style.height=ods+'px';
        orbit.style.transform=`translate(${rx+Math.cos(ang)*radius}px,${ry+Math.sin(ang)*radius}px) translate(-50%,-50%)`;
        const cs=PV('cursorCoreSize'); core.style.width=core.style.height=cs+'px';
        core.style.transform=`translate(${tx}px,${ty}px) translate(-50%,-50%)`;   // center dot at exact pointer
        requestAnimationFrame(l);
      })();
    })();

    /* ---------- AUDIO: stereo + bands + centroid + wave, calm idle (no beat sim) ---------- */
    const AUDIO=(function(){
      const STREAM="https://stream.lufsaud.io/api/stream/lufs-59b422dd",N=2048;
      let el=null,ctx=null,full=null,anL=null,anR=null,splitter=null,src=null,fb=null,tL=null,tR=null,corsOK=null,playing=false;
      const L={bass:0,mid:0,treble:0,energy:0,centroid:0.5,rms:0,live:false,engage:0};
      const wave={L:new Float32Array(N),R:new Float32Array(N),n:N};
      const statEl=document.getElementById('amode');
      function setStat(){ if(!playing){statEl.innerHTML='<span class="idle">idle wisp · tap play</span>';return;}
        statEl.innerHTML=L.live?'<span class="live">● live · elegant-picking</span>':'<span class="idle">◐ buffering…</span>'; }
      fetch(STREAM,{method:'GET',headers:{Range:'bytes=0-1'},mode:'cors'}).then(r=>{corsOK=(r.status===206||r.status===200);}).catch(()=>{corsOK=false;});
      function buildEl(u){el=new Audio();el.loop=true;el.preload='auto';if(u)el.crossOrigin='anonymous';el.src=STREAM;return el;}
      function toggle(){
        if(!el)buildEl(corsOK!==false);
        if(!ctx&&corsOK!==false){try{const AC=window.AudioContext||window.webkitAudioContext;ctx=new AC();
          full=ctx.createAnalyser();full.fftSize=1024;full.smoothingTimeConstant=.8;fb=new Uint8Array(full.frequencyBinCount);
          anL=ctx.createAnalyser();anL.fftSize=N;anR=ctx.createAnalyser();anR.fftSize=N;tL=new Float32Array(N);tR=new Float32Array(N);
          splitter=ctx.createChannelSplitter(2);src=ctx.createMediaElementSource(el);
          src.connect(full);full.connect(ctx.destination);src.connect(splitter);splitter.connect(anL,0);splitter.connect(anR,1);
        }catch(e){full=null;}}
        if(ctx&&ctx.state==='suspended')ctx.resume();
        if(playing){el.pause();playing=false;}else{const p=el.play();if(p&&p.catch)p.catch(()=>{});playing=true;}
        document.getElementById('ico').textContent=playing?'❚❚':'▶';document.getElementById('plab').textContent=playing?'Pause':'Enable audio';setStat();
      }
      function band(a,lo,hi){let s=0,n=0;for(let i=lo;i<hi&&i<a.length;i++){s+=a[i];n++;}return n?s/n/255:0;}
      function readFloat(an,arr){if(an.getFloatTimeDomainData)an.getFloatTimeDomainData(arr);else{const b=new Uint8Array(arr.length);an.getByteTimeDomainData(b);for(let i=0;i<arr.length;i++)arr[i]=(b[i]-128)/128;}}
      let idleT=0, engage=0;
      function update(dt){
        const sm=PV('reactSmooth'); idleT+=dt; const id=PV('idleDrift');
        // idle targets (always computed → the wisp the page rests in)
        const ib=(0.05+0.035*Math.sin(idleT*0.25))*id, im=(0.10+0.05*Math.sin(idleT*0.4))*id, it=(0.07+0.04*Math.sin(idleT*0.6))*id;
        const ie=(ib+im+it)/3, ic=0.5+0.12*Math.sin(idleT*0.3), iamp=0.045*id;
        // live targets (default to idle when there's no audio data)
        let lb=ib,lm=im,lt=it,le=ie,lc=ic,lrms=iamp*0.5,haveLive=false;
        if(playing&&full){
          full.getByteFrequencyData(fb);
          const b=band(fb,1,8),m=band(fb,8,42),t=band(fb,42,140),e=band(fb,1,160);
          if((b+m+t)>0.004){ haveLive=true; lb=b;lm=m;lt=t;le=e;
            let num=0,den=0;for(let i=1;i<fb.length;i++){num+=i*fb[i];den+=fb[i];} lc=den>0?(num/den)/fb.length:0.5;
            readFloat(anL,tL);readFloat(anR,tR);let rms=0;for(let i=0;i<N;i++)rms+=tL[i]*tL[i]+tR[i]*tR[i]; lrms=Math.sqrt(rms/(2*N)); }
        }
        L.live=haveLive;
        // engage envelope: ramp idle→reactive on enable (engageTime), fall back faster on pause
        const tgt=haveLive?1:0, tau=tgt>engage?Math.max(0.05,PV('engageTime')):Math.max(0.05,PV('releaseTime'));
        engage+=(tgt-engage)*(1-Math.exp(-dt/tau)); L.engage=engage;
        // blend idle↔live by engage, then ease into L
        const tb=ib+(lb-ib)*engage, tm=im+(lm-im)*engage, tt=it+(lt-it)*engage, te=ie+(le-ie)*engage, tc=ic+(lc-ic)*engage, trms=(iamp*0.5)+(lrms-iamp*0.5)*engage;
        L.bass+=(tb-L.bass)*sm; L.mid+=(tm-L.mid)*sm; L.treble+=(tt-L.treble)*sm; L.energy+=(te-L.energy)*(sm*0.9); L.centroid+=(tc-L.centroid)*0.2; L.rms=trms;
        // waveform: blend the idle wisp with live samples by the same engage envelope
        for(let i=0;i<N;i++){const u=i/N*Math.PI*2.0; const iwL=Math.sin(u*2.0+idleT*0.7)*iamp, iwR=Math.sin(u*2.0+idleT*0.72+0.15)*iamp;
          const lwL=haveLive?tL[i]:iwL, lwR=haveLive?tR[i]:iwR; wave.L[i]=iwL+(lwL-iwL)*engage; wave.R[i]=iwR+(lwR-iwR)*engage; }
        setStat();
      }
      document.getElementById('play').addEventListener('click',toggle);
      return {L,wave,update,get playing(){return playing;}};
    })();

    /* ---------- GLSL ---------- */
    const NOISE=`
      vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
        vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
        float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.0*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
        vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
        return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
      float fbm(vec3 p){float s=0.0,a=0.5;for(int i=0;i<5;i++){s+=a*snoise(p);p*=2.02;a*=0.5;}return s*0.5+0.5;}`;
    const QUAD=new THREE.PlaneBufferGeometry(2,2);
    const TEAL=[0.471,0.745,0.729],BLUE=[0.125,0.412,0.686],GOLD=[0.906,0.698,0.145],RUST=[0.827,0.322,0.200];
    const STOPS=[TEAL,BLUE,GOLD,RUST];
    function cyc(h){h=((h%1)+1)%1;const f=h*STOPS.length,i=Math.floor(f),t=f-i,a=STOPS[i%4],b=STOPS[(i+1)%4];return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}

    const scene=new THREE.Scene();
    const cam=new THREE.OrthographicCamera(-1,1,1,-1,-10,10);cam.position.z=1;
    function fit(){const a=innerWidth/innerHeight;cam.left=-a;cam.right=a;cam.top=1;cam.bottom=-1;cam.updateProjectionMatrix();}fit();

    /* --- foreground: vectorscope trace + phosphor trail --- */
    const NPMAX=2048, MAXTRAIL=48;
    const lines=[];
    for(let i=0;i<MAXTRAIL;i++){const pos=new Float32Array(NPMAX*3);const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setDrawRange(0,512);
      const m=new THREE.LineBasicMaterial({color:new THREE.Color(TEAL[0],TEAL[1],TEAL[2]),transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false});
      const ln=new THREE.Line(g,m);ln.frustumCulled=false;ln.renderOrder=0;scene.add(ln);lines.push({g,pos,m});}
    // idle vertical guide
    const gpos=new Float32Array(6);gpos[1]=-0.82;gpos[4]=0.82;const gg=new THREE.BufferGeometry();gg.setAttribute('position',new THREE.BufferAttribute(gpos,3));
    const gm=new THREE.LineBasicMaterial({color:new THREE.Color(TEAL[0],TEAL[1],TEAL[2]),transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthTest:false});
    const guide=new THREE.Line(gg,gm);guide.frustumCulled=false;guide.renderOrder=0;scene.add(guide);
    let head=0;

    /* --- fog: brand-cycling aurora, translucent, ON TOP --- */
    const fogMat=new THREE.ShaderMaterial({transparent:true,depthTest:false,depthWrite:false,blending:THREE.NormalBlending,
      uniforms:{uTime:{value:0},uAspect:{value:innerWidth/innerHeight},uMouse:{value:new THREE.Vector2(0,0)},
        uAccent:{value:new THREE.Color(TEAL[0],TEAL[1],TEAL[2])},uOpacity:{value:0.62},uDim:{value:1},uDrift:{value:0.06},uWarp:{value:1.2},uBloom:{value:0.32},uDensity:{value:0.85},uBass:{value:0},uEnergy:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}`,
      fragmentShader:NOISE+`
        varying vec2 vUv;uniform float uTime,uAspect,uOpacity,uDim,uDrift,uWarp,uBloom,uDensity,uBass,uEnergy;uniform vec2 uMouse;uniform vec3 uAccent;
        void main(){
          vec2 uv=vUv;vec2 p=(uv-0.5);p.x*=uAspect;float t=uTime*uDrift;
          float warp=fbm(vec3(p*1.4,t))*uWarp;
          float r=sin((p.y*3.0)+warp*3.0+t*2.0)*0.5+0.5;
          r*=sin((p.y*6.0)-warp*2.0-t*1.3+uMouse.x*0.6)*0.5+0.5;
          float field=pow(r,1.6)*(0.45+uEnergy*0.9)*uDensity;
          float d=length(p-vec2(uMouse.x*0.4,uMouse.y*0.3));
          float bloom=exp(-d*d*(2.2-uBass*1.2))*(uBloom+uBass*0.5);
          vec3 col=vec3(0.066);col=mix(col,uAccent*0.5,field*0.8);col=mix(col,uAccent,field*field*0.7);col+=uAccent*bloom;
          col*=uDim;
          float gr=fract(sin(dot(uv*(1.0+uTime),vec2(12.9898,78.233)))*43758.5453);col+=(gr-0.5)*0.025;
          float alpha=uOpacity*clamp(0.30+field*0.85+bloom,0.0,1.0);
          gl_FragColor=vec4(col,alpha);
        }`});
    const fog=new THREE.Mesh(QUAD,fogMat);fog.frustumCulled=false;fog.renderOrder=10;scene.add(fog);

    let hue=0;
    function frame(t,dt){
      const L=AUDIO.L,W=AUDIO.wave,a=innerWidth/innerHeight;
      P.nx+=(P.tnx-P.nx)*0.07;P.ny+=(P.tny-P.ny)*0.07;
      // colour slew: target hue from slow cycle + bass; actual hue crawls toward it
      const target=PV('colorCycle')*t + L.bass*PV('colorAudio');
      const maxStep=PV('colorSlew')*dt; let dh=target-hue; hue+=Math.max(-maxStep,Math.min(maxStep,dh));
      const ac=cyc(hue); fogMat.uniforms.uAccent.value.setRGB(ac[0],ac[1],ac[2]);
      fogMat.uniforms.uTime.value=t;fogMat.uniforms.uAspect.value=a;fogMat.uniforms.uMouse.value.set(P.nx,P.ny);
      fogMat.uniforms.uOpacity.value=PV('fogOpacity');fogMat.uniforms.uDim.value=PV('fogBright');fogMat.uniforms.uDrift.value=PV('fogDrift');
      fogMat.uniforms.uWarp.value=PV('fogWarp');fogMat.uniforms.uBloom.value=PV('fogBloom');fogMat.uniforms.uDensity.value=PV('fogDensity');
      fogMat.uniforms.uBass.value=L.bass;fogMat.uniforms.uEnergy.value=L.energy;
      // vectorscope trace -> head line (full NPMAX), drawRange trims to scopePoints
      const pts=Math.round(PV('scopePoints')), gain=PV('scopeGain'), idleF=Math.max(0,1.0-L.rms*7.0);
      head=(head+1)%MAXTRAIL; const cur=lines[head]; const sx=Math.min(a,1.4);
      const stepi=W.n/pts;
      for(let s=0;s<pts;s++){const i=Math.floor(s*stepi);const l=W.L[i],rr=W.R[i];
        const side=(rr-l)*0.70710678, mid=(l+rr)*0.70710678;
        let x=side*gain*sx, y=mid*gain + (s/(pts-1)-0.5)*1.6*idleF*PV('scopeIdle');
        cur.pos[s*3]=x; cur.pos[s*3+1]=Math.max(-0.99,Math.min(0.99,y)); cur.pos[s*3+2]=0;}
      cur.g.attributes.position.needsUpdate=true;
      const trail=Math.round(PV('scopeTrail')), decay=PV('scopeDecay'), bright=PV('scopeBright'), eb=PV('scopeEnergy');
      for(let j=0;j<MAXTRAIL;j++){const age=((head-j)+MAXTRAIL)%MAXTRAIL; const o=lines[j];
        o.g.setDrawRange(0,pts);
        o.m.opacity = age<trail ? (bright*Math.pow(decay,age))*(0.5+L.energy*eb) : 0;}
      gm.opacity=0.12*idleF;
    }

    /* ---------- dial panel ---------- */
    (function(){
      const panel=document.getElementById('panel'); let lastG=null; const valSpans={};
      Object.keys(PARAMS).forEach(k=>{const d=PARAMS[k];
        if(d.g!==lastG){const h=document.createElement('h4');h.textContent=d.g;panel.appendChild(h);lastG=d.g;}
        const row=document.createElement('div');row.className='row';
        const lab=document.createElement('div');lab.className='lab';
        const span=document.createElement('b');span.textContent=fmt(d.v); valSpans[k]=span;
        const name=document.createElement('span');name.textContent=d.label;
        lab.appendChild(name);lab.appendChild(span);
        const inp=document.createElement('input');inp.type='range';inp.min=d.min;inp.max=d.max;inp.step=d.step;inp.value=d.v;
        inp.addEventListener('input',()=>{d.v=parseFloat(inp.value);span.textContent=fmt(d.v);updateJSON();});
        row.appendChild(lab);row.appendChild(inp);panel.appendChild(row);});
      const acts=document.createElement('div');acts.className='acts';
      const copy=document.createElement('button');copy.className='btn';copy.textContent='Copy settings';
      const reset=document.createElement('button');reset.className='btn';reset.textContent='Reset';
      acts.appendChild(copy);acts.appendChild(reset);panel.appendChild(acts);
      const ta=document.createElement('textarea');ta.readOnly=true;panel.appendChild(ta);
      function fmt(v){return (Math.round(v*1000)/1000).toString();}
      function snapshot(){const o={};Object.keys(PARAMS).forEach(k=>o[k]=Math.round(PARAMS[k].v*1000)/1000);return o;}
      function updateJSON(){ta.value=JSON.stringify(snapshot());}
      updateJSON();
      copy.addEventListener('click',()=>{const s=JSON.stringify(snapshot(),null,2);ta.value=s;try{navigator.clipboard&&navigator.clipboard.writeText(s);}catch(e){}ta.select&&ta.select();copy.textContent='Copied ✓';setTimeout(()=>copy.textContent='Copy settings',1200);});
      reset.addEventListener('click',()=>{Object.keys(PARAMS).forEach(k=>{PARAMS[k].v=DEF[k];});panel.querySelectorAll('input').forEach((inp,idx)=>{const k=Object.keys(PARAMS)[idx];inp.value=PARAMS[k].v;valSpans[k].textContent=fmt(PARAMS[k].v);});updateJSON();});
      const DEF={};Object.keys(PARAMS).forEach(k=>DEF[k]=PARAMS[k].v);
      document.getElementById('dialBtn').addEventListener('click',()=>{const open=panel.classList.toggle('open');document.getElementById('dialBtn').textContent=open?'✕ Dials':'⚙ Dials';});
    })();

    function onResize(){sz();fit();fogMat.uniforms.uAspect.value=innerWidth/innerHeight;}
    addEventListener('resize',onResize); addEventListener('orientationchange',onResize);
    const clock=new THREE.Clock();
    function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),0.05);const t=REDUCED?6.0:clock.elapsedTime;
      AUDIO.update(dt);frame(t,dt);renderer.render(scene,cam);}
    loop();
  })();
  </script>
</body>
</html>
