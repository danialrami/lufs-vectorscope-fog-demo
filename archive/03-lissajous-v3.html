<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>lufs. — lissajous v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@500;700;800&family=Public+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ground:#111111;--teal:#78BEBA;--blue:#2069af;--gold:#E7B225;--rust:#D35233;--cream:#fbf9e2;--muted:rgba(251,249,226,.62);--dim:rgba(251,249,226,.12);}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--ground);overflow:hidden;color:var(--cream);font-family:"Public Sans",system-ui,sans-serif;cursor:none}
  #gl{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0}
  .grain{position:fixed;inset:-50%;width:200%;height:200%;z-index:1;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");animation:grain 7s steps(6) infinite}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-6%,4%)}50%{transform:translate(5%,-5%)}75%{transform:translate(-4%,6%)}100%{transform:translate(0,0)}}
  .veil{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(125% 125% at 50% 44%,transparent 58%,rgba(8,8,8,.5) 100%)}
  .label{position:fixed;left:clamp(16px,3vw,34px);top:clamp(14px,3vh,28px);z-index:20;font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.28em;font-size:.62rem;color:var(--muted);pointer-events:none;line-height:1.9}
  .label b{color:var(--cream);font-weight:400}.label .dot{color:var(--teal)}
  .audiobar{position:fixed;right:clamp(16px,3vw,34px);top:clamp(14px,3vh,26px);z-index:30;display:flex;align-items:center;gap:12px;font-family:"Space Mono",monospace}
  .play{display:flex;align-items:center;gap:9px;border:1px solid var(--dim);border-radius:999px;background:rgba(12,12,12,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--cream);padding:9px 16px;font:inherit;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;cursor:none;transition:.22s ease}
  .play:hover{border-color:var(--teal);color:var(--teal)}
  .stat{font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7}
  .stat .live{color:var(--teal)}.stat .sim{color:var(--gold)}.stat b{color:var(--cream);font-weight:400}
  .switch{position:fixed;left:50%;bottom:clamp(18px,4vh,38px);transform:translateX(-50%);z-index:20;display:flex;gap:6px;padding:6px;border:1px solid var(--dim);border-radius:999px;background:rgba(12,12,12,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .chip{font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.15em;font-size:.57rem;color:var(--muted);border:1px solid transparent;background:transparent;padding:9px 13px;border-radius:999px;cursor:none;transition:.22s ease;white-space:nowrap}
  .chip:hover{color:var(--cream);border-color:var(--dim)}
  .chip.active{color:var(--ground);background:var(--teal);border-color:var(--teal);font-weight:700}
  .chip small{display:block;font-size:.47rem;letter-spacing:.07em;opacity:.7;margin-top:2px;font-weight:400}
  .cur-dot,.cur-ring{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;border-radius:50%;mix-blend-mode:difference}
  .cur-dot{width:6px;height:6px;background:var(--cream)}
  .cur-ring{width:30px;height:30px;border:1px solid rgba(251,249,226,.7);transition:width .2s,height .2s}.cur-ring.hot{width:52px;height:52px}
  @media (hover:none){.cur-dot,.cur-ring{display:none}html,body,.chip,.play{cursor:auto}}
  @media (max-width:680px){.chip small{display:none}.chip{padding:8px 9px}.stat{display:none}}
</style>
</head>
<body>
  <canvas id="gl"></canvas><div class="veil"></div><div class="grain"></div>
  <div class="label"><div><b>lufs<span class="dot">.</span></b></div><div>lissajous · v3</div></div>
  <div class="audiobar">
    <div class="stat"><div><b>elegant-picking</b></div><div id="amode">tap play</div></div>
    <button class="play" id="play"><span id="ico">▶</span><span id="plab">Enable audio</span></button>
  </div>
  <div class="switch" id="switch">
    <button class="chip active" data-mode="scope">Vectorscope<small>real L/R · mid-side</small></button>
    <button class="chip" data-mode="cloud">Point cloud<small>brand-cycle bg</small></button>
    <button class="chip" data-mode="spectral">Spectral<small>centroid color · gray bg</small></button>
    <button class="chip" data-mode="control">v2 control<small>lines · aurora</small></button>
  </div>
  <div class="cur-dot"></div><div class="cur-ring"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  (function(){
    if(!window.THREE){document.body.style.background="#111";return;}
    const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas=document.getElementById('gl');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
    renderer.setClearColor(0x111111,1); const PR=Math.min(window.devicePixelRatio||1,2); renderer.setPixelRatio(PR);
    function sz(){renderer.setSize(innerWidth,innerHeight,false);} sz();

    const P={tnx:0,tny:0,nx:0,ny:0,clickT:-999,cx:0,cy:0};
    addEventListener('pointermove',e=>{P.tnx=(e.clientX/innerWidth)*2-1;P.tny=-((e.clientY/innerHeight)*2-1);},{passive:true});
    addEventListener('pointerdown',e=>{P.clickT=performance.now()/1000;P.cx=(e.clientX/innerWidth)*2-1;P.cy=-((e.clientY/innerHeight)*2-1);});
    (function(){const d=document.querySelector('.cur-dot'),r=document.querySelector('.cur-ring');let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
      addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;d.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`;});
      (function l(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;r.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(l);})();
      addEventListener('mouseover',e=>{if(e.target.closest('.chip,.play'))r.classList.add('hot');});
      addEventListener('mouseout',e=>{if(e.target.closest('.chip,.play'))r.classList.remove('hot');});})();

    /* ---------------- AUDIO engine: stereo + bands + centroid + waveforms ---------------- */
    const AUDIO=(function(){
      const STREAM="https://stream.lufsaud.io/api/stream/lufs-59b422dd", N=2048;
      let el=null,ctx=null,full=null,anL=null,anR=null,splitter=null,src=null,fb=null,tL=null,tR=null,corsOK=null,playing=false;
      const L={bass:0,mid:0,treble:0,energy:0,beat:0,_avg:0,_cool:0,centroid:0.5,rms:0,live:false};
      const wave={L:new Float32Array(N),R:new Float32Array(N),n:N};
      const statEl=document.getElementById('amode');
      function setStat(){ if(!playing){statEl.innerHTML=corsOK===false?'<span class="sim">sim · cors off</span>':'tap play';return;}
        statEl.innerHTML=L.live?'<span class="live">● live · elegant-picking</span>':'<span class="sim">◐ sim</span>'; }
      fetch(STREAM,{method:'GET',headers:{Range:'bytes=0-1'},mode:'cors'}).then(r=>{corsOK=(r.status===206||r.status===200);}).catch(()=>{corsOK=false;}).finally(setStat);
      function buildEl(useCors){ el=new Audio(); el.loop=true; el.preload='auto'; if(useCors)el.crossOrigin='anonymous'; el.src=STREAM; return el; }
      function toggle(){
        if(!el) buildEl(corsOK!==false);
        if(!ctx && corsOK!==false){ try{
          const AC=window.AudioContext||window.webkitAudioContext; ctx=new AC();
          full=ctx.createAnalyser(); full.fftSize=1024; full.smoothingTimeConstant=.8; fb=new Uint8Array(full.frequencyBinCount);
          anL=ctx.createAnalyser(); anL.fftSize=N; anR=ctx.createAnalyser(); anR.fftSize=N;
          tL=new Float32Array(N); tR=new Float32Array(N);
          splitter=ctx.createChannelSplitter(2); src=ctx.createMediaElementSource(el);
          src.connect(full); full.connect(ctx.destination);
          src.connect(splitter); splitter.connect(anL,0); splitter.connect(anR,1);
        }catch(e){ full=null; } }
        if(ctx&&ctx.state==='suspended') ctx.resume();
        if(playing){el.pause();playing=false;} else {const p=el.play(); if(p&&p.catch)p.catch(()=>{}); playing=true;}
        document.getElementById('ico').textContent=playing?'❚❚':'▶'; document.getElementById('plab').textContent=playing?'Pause':'Enable audio'; setStat();
      }
      function band(a,lo,hi){let s=0,n=0;for(let i=lo;i<hi&&i<a.length;i++){s+=a[i];n++;}return n?s/n/255:0;}
      let simT=0;
      function readFloat(an,arr){ if(an.getFloatTimeDomainData) an.getFloatTimeDomainData(arr);
        else { const b=new Uint8Array(arr.length); an.getByteTimeDomainData(b); for(let i=0;i<arr.length;i++)arr[i]=(b[i]-128)/128; } }
      function update(dt){
        if(playing&&full){
          full.getByteFrequencyData(fb);
          const b=band(fb,1,8),m=band(fb,8,42),t=band(fb,42,140),e=band(fb,1,160);
          L.live=(b+m+t)>0.004;
          if(L.live){
            L.bass+=(b-L.bass)*.35;L.mid+=(m-L.mid)*.35;L.treble+=(t-L.treble)*.35;L.energy+=(e-L.energy)*.3;
            let num=0,den=0; for(let i=1;i<fb.length;i++){num+=i*fb[i];den+=fb[i];}
            const c=den>0?(num/den)/fb.length:0.5; L.centroid+=(c-L.centroid)*.2;
            L._avg+=(L.energy-L._avg)*.04; if(L.energy>L._avg*1.32&&L._cool<=0){L.beat=1;L._cool=10;}else{L.beat*=.8;L._cool--;}
            readFloat(anL,tL); readFloat(anR,tR);
            let rms=0; for(let i=0;i<N;i++){wave.L[i]=tL[i];wave.R[i]=tR[i];rms+=tL[i]*tL[i]+tR[i]*tR[i];}
            L.rms=Math.sqrt(rms/(2*N));
            return;
          }
        } else L.live=false;
        // ---- sim ----
        simT+=dt; const bpm=104, ph=(simT*bpm/60)%1, thump=Math.pow(1-ph,2.2);
        L.bass=0.18+thump*0.7; L.mid=0.30+0.22*Math.sin(simT*1.7)+0.12*Math.sin(simT*0.6);
        L.treble=0.22+0.22*Math.abs(Math.sin(simT*3.3)); L.energy=(L.bass+L.mid+L.treble)/3;
        L.centroid=0.45+0.25*Math.sin(simT*0.5); L.beat=ph<0.05?1:L.beat*0.8;
        const env=0.25+thump*0.55, f1=2.0+Math.sin(simT*0.2)*0.05, f2=3.0; L.rms=env*0.6;
        for(let i=0;i<N;i++){ const u=i/N*Math.PI*2.0;
          wave.L[i]=Math.sin(f1*u+simT*1.3)*env; wave.R[i]=Math.sin(f2*u)*env*(0.7+0.3*Math.sin(simT*0.7)); }
      }
      document.getElementById('play').addEventListener('click',toggle);
      return {L,wave,update,get playing(){return playing;}};
    })();

    /* ---------------- shared GLSL ---------------- */
    const NOISE=`
      vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
        vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
        float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.0*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
        vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
        return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
      float fbm(vec3 p){float s=0.0,a=0.5;for(int i=0;i<5;i++){s+=a*snoise(p);p*=2.02;a*=0.5;}return s*0.5+0.5;}`;
    const QUAD=new THREE.PlaneBufferGeometry(2,2);
    const C={teal:[0.471,0.745,0.729],tealDeep:[0.16,0.34,0.34],blue:[0.125,0.412,0.686],gold:[0.906,0.698,0.145],rust:[0.827,0.322,0.200]};
    function pickColor(){const r=Math.random();if(r<0.64){const m=0.4+Math.random()*0.6;return [C.tealDeep[0]+(C.teal[0]-C.tealDeep[0])*m,C.tealDeep[1]+(C.teal[1]-C.tealDeep[1])*m,C.tealDeep[2]+(C.teal[2]-C.tealDeep[2])*m];}if(r<0.86)return C.blue;if(r<0.95)return C.gold;return C.rust;}
    // brand palette cycle teal->blue->gold->rust->teal
    const STOPS=[C.teal,C.blue,C.gold,C.rust];
    function cycle(h){h=((h%1)+1)%1; const f=h*STOPS.length; const i=Math.floor(f),t=f-i; const a=STOPS[i%STOPS.length],b=STOPS[(i+1)%STOPS.length]; return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
    function centroidColor(c){ // 0 (bassy)->rust/gold, 1 (bright)->teal/blue
      c=Math.max(0,Math.min(1,c)); const seq=[C.rust,C.gold,C.teal,C.blue]; const f=c*(seq.length-1); const i=Math.floor(f),t=f-Math.min(i,seq.length-2); const a=seq[Math.min(i,seq.length-1)],b=seq[Math.min(i+1,seq.length-1)]; return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}

    /* ---------------- aurora background factory (modes 2/3/4) ---------------- */
    function makeAurora(){
      const mat=new THREE.ShaderMaterial({depthTest:false,depthWrite:false,
        uniforms:{uTime:{value:0},uAspect:{value:innerWidth/innerHeight},uBass:{value:0},uEnergy:{value:0},uMouse:{value:new THREE.Vector2(0,0)},
          uAccent:{value:new THREE.Color(0.471,0.745,0.729)},uGray:{value:0},uDim:{value:1}},
        vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}`,
        fragmentShader:NOISE+`
          varying vec2 vUv;uniform float uTime,uAspect,uBass,uEnergy,uGray,uDim;uniform vec2 uMouse;uniform vec3 uAccent;
          void main(){
            vec2 uv=vUv;vec2 p=(uv-0.5);p.x*=uAspect;float t=uTime*0.06;
            float warp=fbm(vec3(p*1.4,t))*1.2;
            float r=sin((p.y*3.0)+warp*3.0+t*2.0)*0.5+0.5;
            r*=sin((p.y*6.0)-warp*2.0-t*1.3+uMouse.x*0.6)*0.5+0.5;
            float field=pow(r,1.6)*(0.5+uEnergy*0.9);
            float d=length(p-vec2(uMouse.x*0.4,uMouse.y*0.3));
            float bloom=exp(-d*d*(2.2-uBass*1.2))*(0.32+uBass*0.7);
            vec3 col;
            if(uGray>0.5){ float g=field*0.55+bloom*0.4; col=vec3(0.066)+vec3(g); }
            else { col=vec3(0.066); col=mix(col,uAccent*0.5,field*0.8); col=mix(col,uAccent,field*field*0.7); col+=uAccent*bloom; }
            float vig=smoothstep(1.25,0.3,length(p));col*=(0.4+vig*0.6)*uDim;
            float gr=fract(sin(dot(uv*(1.0+uTime),vec2(12.9898,78.233)))*43758.5453);col+=(gr-0.5)*0.03;
            gl_FragColor=vec4(col,1.0);
          }`});
      const mesh=new THREE.Mesh(QUAD,mat);mesh.frustumCulled=false;mesh.renderOrder=-1;return {mesh,mat};
    }
    function orthoCam(){const a=innerWidth/innerHeight;const c=new THREE.OrthographicCamera(-a,a,1,-1,-10,10);c.position.z=1;return c;}
    function fitOrtho(c){const a=innerWidth/innerHeight;c.left=-a;c.right=a;c.top=1;c.bottom=-1;c.updateProjectionMatrix();}

    /* =========================================================
       MODE 1 — REAL VECTORSCOPE (Mid/Side) + earendil point-field bg
       ========================================================= */
    function modeScope(){
      // --- background: calm earendil-style point field with ripples + warm rim ---
      const bgScene=new THREE.Scene();
      const bgCam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,300); bgCam.position.set(0,9,16); bgCam.lookAt(0,0,0);
      const COLS=150,ROWS=150,BN=COLS*ROWS,SPAN=46;
      const bpos=new Float32Array(BN*3),bcol=new Float32Array(BN*3);let k=0;
      for(let j=0;j<ROWS;j++)for(let i=0;i<COLS;i++){const x=(i/(COLS-1)-0.5)*SPAN,z=(j/(ROWS-1)-0.5)*SPAN;bpos[k*3]=x;bpos[k*3+1]=0;bpos[k*3+2]=z;
        const warm=Math.max(0,1-Math.hypot(x,z)/26); const c=[C.tealDeep[0]+(C.gold[0]-C.tealDeep[0])*warm*0.5,C.tealDeep[1]+(C.gold[1]-C.tealDeep[1])*warm*0.35,C.tealDeep[2]*(1.0-warm*0.3)];
        bcol[k*3]=c[0];bcol[k*3+1]=c[1];bcol[k*3+2]=c[2];k++;}
      const bgeo=new THREE.BufferGeometry();bgeo.setAttribute('position',new THREE.BufferAttribute(bpos,3));bgeo.setAttribute('aColor',new THREE.BufferAttribute(bcol,3));
      const MAXR=5;const uRip=[];for(let i=0;i<MAXR;i++)uRip.push(new THREE.Vector4(0,0,-999,0));
      const bmat=new THREE.ShaderMaterial({transparent:true,depthTest:true,depthWrite:false,blending:THREE.NormalBlending,
        uniforms:{uTime:{value:0},uSize:{value:1.7*PR},uBass:{value:0},uRip:{value:uRip},uMouse:{value:new THREE.Vector2(0,0)}},
        vertexShader:NOISE+`attribute vec3 aColor;uniform float uTime,uSize,uBass;uniform vec4 uRip[${MAXR}];uniform vec2 uMouse;varying vec3 vCol;varying float vG;
          void main(){vec3 p=position;float h=snoise(vec3(p.xz*0.05,uTime*0.2))*0.8*(0.6+uBass*1.5);
            for(int i=0;i<${MAXR};i++){vec4 r=uRip[i];float age=uTime-r.z;if(age<0.0||age>6.0)continue;float d=distance(p.xz,r.xy);h+=sin(d*1.5-age*6.5)*exp(-age*1.0)*exp(-d*0.12)*r.w*2.0;}
            vec2 mp=uMouse*22.0;float dm=distance(p.xz,mp);h+=sin(dm*1.3-uTime*4.5)*exp(-dm*0.2)*0.7;
            p.y=h;vG=clamp(0.25+abs(h)*0.2,0.0,1.0);vCol=aColor;
            vec4 mv=modelViewMatrix*vec4(p,1.0);gl_PointSize=uSize*(120.0/-mv.z)*(0.7+vG*0.6);gl_Position=projectionMatrix*mv;}`,
        fragmentShader:`precision mediump float;varying vec3 vCol;varying float vG;void main(){vec2 c=gl_PointCoord-0.5;float d=length(c);if(d>0.5)discard;float a=smoothstep(0.5,0.06,d);gl_FragColor=vec4(vCol*(0.45+vG*0.7),a*0.5);}`});
      const bgpts=new THREE.Points(bgeo,bmat);bgpts.frustumCulled=false;bgScene.add(bgpts);
      let ri=0;function spawn(x,z,a,t){uRip[ri].set(x,z,t,a);ri=(ri+1)%MAXR;}let lastBeat=0;

      // --- foreground: vectorscope trace with phosphor trail ---
      const fgScene=new THREE.Scene(); const fgCam=orthoCam();
      const TRAIL=16, NP=512;
      const lines=[];
      for(let i=0;i<TRAIL;i++){const pos=new Float32Array(NP*3);const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
        const m=new THREE.LineBasicMaterial({color:new THREE.Color(C.teal[0],C.teal[1],C.teal[2]),transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthTest:false});
        const ln=new THREE.Line(g,m);ln.frustumCulled=false;fgScene.add(ln);lines.push({g,pos,m});}
      // idle vertical guide
      const gpos=new Float32Array(2*3); gpos[1]=-0.82; gpos[4]=0.82; const gg=new THREE.BufferGeometry(); gg.setAttribute('position',new THREE.BufferAttribute(gpos,3));
      const gm=new THREE.LineBasicMaterial({color:new THREE.Color(C.teal[0],C.teal[1],C.teal[2]),transparent:true,opacity:0.0,blending:THREE.AdditiveBlending,depthTest:false});
      const guide=new THREE.Line(gg,gm);guide.frustumCulled=false;fgScene.add(guide);
      let head=0;
      return {
        update(t,dt){const L=AUDIO.L,W=AUDIO.wave;
          bmat.uniforms.uTime.value=t;bmat.uniforms.uBass.value=L.bass;bmat.uniforms.uMouse.value.set(P.nx,P.ny);
          if(L.beat>0.6&&t-lastBeat>0.2){spawn((Math.random()-0.5)*26,(Math.random()-0.5)*26,0.7+L.bass,t);lastBeat=t;}
          if(P.clickT>0&&t-P.clickT<0.05)spawn(P.cx*22,P.cy*22,1.2,t);
          bgpts.rotation.y=P.nx*0.18; bgCam.position.x=P.nx*2.5; bgCam.lookAt(0,0,0);
          // vectorscope trace into head line
          head=(head+1)%TRAIL; const cur=lines[head]; const a=innerWidth/innerHeight;
          const gain=1.7, idle=Math.max(0,1.0-L.rms*7.0); const step=(W.n/NP);
          for(let s=0;s<NP;s++){const i=Math.floor(s*step);const l=W.L[i],r=W.R[i];
            const side=(r-l)*0.70710678, mid=(l+r)*0.70710678;
            let x=side*gain, y=mid*gain + (s/(NP-1)-0.5)*1.6*idle;
            cur.pos[s*3]=x*Math.min(a,1.4); cur.pos[s*3+1]=Math.max(-0.98,Math.min(0.98,y)); cur.pos[s*3+2]=0;}
          cur.g.attributes.position.needsUpdate=true;
          for(let j=0;j<TRAIL;j++){const age=((head-j)+TRAIL)%TRAIL; lines[j].m.opacity=(0.85*Math.pow(0.78,age))*(0.5+L.energy*0.7);}
          gm.opacity=0.10*idle;
        },
        render(r){r.autoClear=false;r.clear();r.render(bgScene,bgCam);r.clearDepth();r.render(fgScene,fgCam);},
        resize(){bgCam.aspect=innerWidth/innerHeight;bgCam.updateProjectionMatrix();fitOrtho(fgCam);},
        dispose(){bgeo.dispose();bmat.dispose();lines.forEach(o=>{o.g.dispose();o.m.dispose();});gg.dispose();gm.dispose();}
      };
    }

    /* =========================================================
       MODE 2 — abstract Lissajous POINT CLOUD + brand-cycling aurora bg
       ========================================================= */
    function modeCloud(){
      const scene=new THREE.Scene(); const cam=orthoCam();
      const A=makeAurora(); scene.add(A.mesh);
      const CURVES=3, PER=2600, NP=CURVES*PER;
      const pos=new Float32Array(NP*3),col=new Float32Array(NP*3),seed=new Float32Array(NP);
      const ratios=[[3,2],[5,4],[5,3]];
      for(let c=0;c<CURVES;c++)for(let s=0;s<PER;s++){const idx=c*PER+s;const base=pickColor();col[idx*3]=base[0];col[idx*3+1]=base[1];col[idx*3+2]=base[2];seed[idx]=Math.random();}
      const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('aColor',new THREE.BufferAttribute(col,3));geo.setAttribute('aSeed',new THREE.BufferAttribute(seed,1));
      const mat=new THREE.ShaderMaterial({transparent:true,depthTest:false,blending:THREE.AdditiveBlending,
        uniforms:{uSize:{value:1.7*PR},uEnergy:{value:0}},
        vertexShader:`attribute vec3 aColor;attribute float aSeed;uniform float uSize,uEnergy;varying vec3 vCol;
          void main(){vCol=aColor;gl_PointSize=uSize*(0.8+uEnergy*1.2);gl_Position=vec4(position.xy,0.0,1.0);}`,
        fragmentShader:`precision mediump float;varying vec3 vCol;void main(){vec2 c=gl_PointCoord-0.5;float d=length(c);if(d>0.5)discard;float a=smoothstep(0.5,0.05,d);gl_FragColor=vec4(vCol*1.1,a*0.85);}`});
      const pts=new THREE.Points(geo,mat);pts.frustumCulled=false;scene.add(pts);
      return {
        update(t,dt){const L=AUDIO.L;const a=innerWidth/innerHeight;
          const acc=cycle(t*0.04+L.bass*1.2); A.mat.uniforms.uAccent.value.setRGB(acc[0],acc[1],acc[2]);
          A.mat.uniforms.uTime.value=t;A.mat.uniforms.uAspect.value=a;A.mat.uniforms.uBass.value=L.bass;A.mat.uniforms.uEnergy.value=L.energy;A.mat.uniforms.uMouse.value.set(P.nx,P.ny);
          mat.uniforms.uEnergy.value=L.energy;
          const amp=0.45+L.bass*0.4;
          for(let c=0;c<CURVES;c++){const da=ratios[c][0]+L.mid*0.6, db=ratios[c][1]+L.treble*0.5, delta=t*(0.3+c*0.05)+L.treble*1.4;
            for(let s=0;s<PER;s++){const idx=c*PER+s;const u=s/PER*Math.PI*2.0;
              let x=Math.sin(da*u+delta)*amp*0.92, y=Math.sin(db*u)*amp*0.92;
              x+=P.nx*0.08; y+=P.ny*0.08;
              // map x by aspect so it isn't stretched (clip space -1..1)
              pos[idx*3]=x/a; pos[idx*3+1]=y; pos[idx*3+2]=0;}}
          geo.attributes.position.needsUpdate=true;
        },
        render(r){r.autoClear=true;r.render(scene,cam);},
        resize(){fitOrtho(cam);A.mat.uniforms.uAspect.value=innerWidth/innerHeight;},
        dispose(){A.mat.dispose();geo.dispose();mat.dispose();}
      };
    }

    /* =========================================================
       MODE 3 — re-abstracted Lissajous colored by spectral centroid + grayscale gaseous bg
       ========================================================= */
    function modeSpectral(){
      const scene=new THREE.Scene(); const cam=orthoCam();
      const A=makeAurora(); A.mat.uniforms.uGray.value=1; A.mat.uniforms.uDim.value=0.7; scene.add(A.mesh);
      const CURVES=3, PER=1100, NP=CURVES*PER;
      const pos=new Float32Array(NP*3),seed=new Float32Array(NP);
      for(let i=0;i<NP;i++)seed[i]=Math.random();
      const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('aSeed',new THREE.BufferAttribute(seed,1));
      const ratios=[[3,2],[4,3],[5,4]];
      const mat=new THREE.LineBasicMaterial({color:new THREE.Color(C.teal[0],C.teal[1],C.teal[2]),transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthTest:false});
      // render each curve as its own line segment range -> use separate Line objects
      const lines=[];
      for(let c=0;c<CURVES;c++){const lp=new Float32Array(PER*3);const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(lp,3));
        const m=mat.clone();m.opacity=0.7-c*0.12;const ln=new THREE.Line(g,m);ln.frustumCulled=false;scene.add(ln);lines.push({g,lp,m});}
      return {
        update(t,dt){const L=AUDIO.L;const a=innerWidth/innerHeight;
          A.mat.uniforms.uTime.value=t;A.mat.uniforms.uAspect.value=a;A.mat.uniforms.uEnergy.value=L.energy*0.6;A.mat.uniforms.uBass.value=L.bass;A.mat.uniforms.uMouse.value.set(P.nx,P.ny);
          const cc=centroidColor(L.centroid); const col=new THREE.Color(cc[0],cc[1],cc[2]);
          const amp=0.5+L.bass*0.4;
          for(let c=0;c<CURVES;c++){const o=lines[c];o.m.color.copy(col);
            const da=ratios[c][0]+L.mid*0.5, db=ratios[c][1]+L.treble*0.4, delta=t*(0.28+c*0.05)+L.treble*1.2;
            for(let s=0;s<PER;s++){const u=s/(PER-1)*Math.PI*2.0;let x=Math.sin(da*u+delta)*amp*(0.92-c*0.08), y=Math.sin(db*u)*amp*(0.92-c*0.08);
              x+=P.nx*0.06;y+=P.ny*0.06; o.lp[s*3]=x/a;o.lp[s*3+1]=y;o.lp[s*3+2]=0;}
            o.g.attributes.position.needsUpdate=true;}
        },
        render(r){r.autoClear=true;r.render(scene,cam);},
        resize(){fitOrtho(cam);A.mat.uniforms.uAspect.value=innerWidth/innerHeight;},
        dispose(){A.mat.dispose();geo.dispose();mat.dispose();lines.forEach(o=>{o.g.dispose();o.m.dispose();});}
      };
    }

    /* =========================================================
       MODE 4 — v2 control: 5 additive Lissajous lines + aurora bg (verbatim style)
       ========================================================= */
    function modeControl(){
      const scene=new THREE.Scene(); const cam=orthoCam();
      const A=makeAurora(); scene.add(A.mesh);
      const CURVES=5,SEG=1400;const curves=[];const ratios=[[3,2],[5,4],[4,3],[5,3],[7,5]];
      for(let i=0;i<CURVES;i++){const pos=new Float32Array(SEG*3),col=new Float32Array(SEG*3);const base=pickColor();
        for(let s=0;s<SEG;s++){col[s*3]=base[0];col[s*3+1]=base[1];col[s*3+2]=base[2];}
        const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));
        const m=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.55-i*0.06,blending:THREE.AdditiveBlending,depthTest:false});
        const line=new THREE.Line(g,m);line.frustumCulled=false;scene.add(line);curves.push({g,pos,a:ratios[i][0],b:ratios[i][1],ph:Math.random()*6.28,i});}
      return {
        update(t,dt){const L=AUDIO.L;const a=innerWidth/innerHeight;
          A.mat.uniforms.uTime.value=t;A.mat.uniforms.uAspect.value=a;A.mat.uniforms.uBass.value=L.bass;A.mat.uniforms.uEnergy.value=L.energy;A.mat.uniforms.uMouse.value.set(P.nx,P.ny);
          const Amp=0.55+L.bass*0.42;
          for(const c of curves){const da=c.a+L.mid*0.6,db=c.b+L.treble*0.5,delta=t*(0.25+c.i*0.05)+c.ph+L.treble*1.4,amp=Amp*(0.78-c.i*0.07);
            for(let s=0;s<SEG;s++){const u=s/(SEG-1)*Math.PI*2.0;let x=Math.sin(da*u+delta)*amp*0.92,y=Math.sin(db*u)*amp*0.92;
              x+=P.nx*0.12*Math.sin(u*2.0);y+=P.ny*0.12*Math.cos(u*2.0);const beat=L.beat*0.06,rr=1.0+beat*Math.sin(u*8.0+t*6.0);
              c.pos[s*3]=x*rr;c.pos[s*3+1]=y*rr;c.pos[s*3+2]=0;}
            c.g.attributes.position.needsUpdate=true;}
        },
        render(r){r.autoClear=true;r.render(scene,cam);},
        resize(){fitOrtho(cam);A.mat.uniforms.uAspect.value=innerWidth/innerHeight;},
        dispose(){A.mat.dispose();curves.forEach(c=>c.g.dispose());}
      };
    }

    /* ---------------- controller ---------------- */
    const builders={scope:modeScope,cloud:modeCloud,spectral:modeSpectral,control:modeControl};
    let cur=null,curKey=null;
    function setMode(k){if(curKey===k)return;if(cur&&cur.dispose)cur.dispose();cur=builders[k]();curKey=k;
      document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.mode===k));}
    document.getElementById('switch').addEventListener('click',e=>{const b=e.target.closest('.chip');if(b)setMode(b.dataset.mode);});
    addEventListener('resize',()=>{sz();cur&&cur.resize&&cur.resize();});
    const clock=new THREE.Clock(); setMode('scope');
    function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),0.05);const t=REDUCED?6.0:clock.elapsedTime;
      P.nx+=(P.tnx-P.nx)*0.07;P.ny+=(P.tny-P.ny)*0.07;AUDIO.update(dt);
      if(cur){cur.update(t,dt);cur.render(renderer);}}
    loop();
  })();
  </script>
</body>
</html>
